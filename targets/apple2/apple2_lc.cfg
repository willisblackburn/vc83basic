FEATURES {
    STARTADDRESS: default = $0803;
}
SYMBOLS {
    __EXEHDR__:       type = import;
    __FILETYPE__:     type = export,    value = $0006; # ProDOS file type
    __BUFFERS_SIZE__: type = export,    value = $0100;
    __HIMEM__:        type = weak,      value = $9600 - __BUFFERS_SIZE__; # Presumed RAM end (minus BUFFERS area)
    __LCADDR__:       type = export,    value = $D000;
    __LCSIZE__:       type = export,    value = $2800;
}
MEMORY {
    ZEROPAGE:   file = "",  start = $0080,          size = $0080;
    HEADER:     file = %O,  start = %S - $003A,     size = $003A;
    MAIN:       file = %O,  start = %S,             size = __HIMEM__ - %S,              define = yes;
    BSS:        file = "",  start = __ONCE_RUN__,   size = __HIMEM__ - __ONCE_RUN__;
    BUFFERS:    file = "",  start = __HIMEM__ ,     size = __BUFFERS_SIZE__;  
    LC:         file = %O,  start = __LCADDR__,     size = __LCSIZE__;
}
SEGMENTS {
    ZEROPAGE:   load = ZEROPAGE,                type = zp;
    EXEHDR:     load = HEADER,                  type = ro;
    STARTUP:    load = MAIN,                    type = ro,      define = yes;
    ONCE:       load = MAIN,                    type = ro,      define = yes;
    CODE:       load = MAIN,        run = LC,   type = ro,      define = yes;   # First LC segment
    VEC:        load = MAIN,        run = LC,   type = ro,      define = yes;
    XVEC:       load = MAIN,        run = LC,   type = ro,      define = yes;
    FUNC:       load = MAIN,        run = LC,   type = ro,      define = yes;
    XFUNC:      load = MAIN,        run = LC,   type = ro,      define = yes;
    PARSER:     load = MAIN,        run = LC,   type = ro,      define = yes;   # Last LC segment
    BSS:        load = BSS,                     type = bss,     define = yes;
    BUFFERS:    load = BUFFERS,                 type = bss;
}

SYMBOLS {
    __EXEHDR__:       type = import;
    __BUFFERS_SIZE__: type = weak, value = $0300;
    __STACKSIZE__:    type = weak, value = $0800; # 2k stack
}
MEMORY {
    ZEROPAGE: file = "",               start = $0000,                    size = $0100;
    BUFFERS:  file = "",               start = $0200,                    size = __BUFFERS_SIZE__;  
    HEADER:   file = %O,               start = $0000,                    size = $000C;
    MAIN:     file = %O, define = yes, start = $0200 + __BUFFERS_SIZE__, size = $FDC0 - __STACKSIZE__ - __BUFFERS_SIZE__;
}
SEGMENTS {
    ZEROPAGE: load = ZEROPAGE, type = zp;
    EXEHDR:   load = HEADER,   type = ro;
    STARTUP:  load = MAIN,     type = ro;
    ONCE:     load = MAIN,     type = ro;
    CODE:     load = MAIN,     type = ro;
    VEC:      load = MAIN,     type = ro,  define   = yes;
    XVEC:     load = MAIN,     type = ro,  define   = yes;
    FUNC:     load = MAIN,     type = ro,  define   = yes;
    XFUNC:    load = MAIN,     type = ro,  define   = yes;
    PARSER:   load = MAIN,     type = ro;
    RODATA:   load = MAIN,     type = ro,  optional = yes;
    DATA:     load = MAIN,     type = rw;
    BSS:      load = MAIN,     type = bss, define   = yes;
    BUFFERS:  load = BUFFERS,  type = bss;
}
FEATURES {
    CONDES:   type    = constructor,
              label   = __CONSTRUCTOR_TABLE__,
              count   = __CONSTRUCTOR_COUNT__,
              segment = ONCE;
    CONDES:   type    = destructor,
              label   = __DESTRUCTOR_TABLE__,
              count   = __DESTRUCTOR_COUNT__,
              segment = RODATA;
    CONDES:   type    = interruptor,
              label   = __INTERRUPTOR_TABLE__,
              count   = __INTERRUPTOR_COUNT__,
              segment = RODATA,
              import  = __CALLIRQ__;
}

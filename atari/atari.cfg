SYMBOLS {
    __BUFFERS_SIZE__: type = weak, value = $0100;
}
MEMORY {
    ZP:      file = "", define = yes, start = $0080, size = $0080;
    MAIN:    file = %O, define = yes, start = $2000, size = $BC20 - $2000;
}
FILES {
    %O: format = atari;
}
FORMATS {
    atari: runad = start;
}
SEGMENTS {
    ZEROPAGE: load = ZP,      type = zp,  optional = yes;
    BUFFERS:  load = MAIN,    type = bss;
    CODE:     load = MAIN,    type = ro;
    VECTORS:  load = MAIN,    type = ro;
    PARSER:   load = MAIN,    type = ro;
    RODATA:   load = MAIN,    type = ro,  optional = yes;
    DATA:     load = MAIN,    type = rw;
    ONCE:     load = MAIN,    type = ro,  define   = yes;
    BSS:      load = MAIN,    type = bss, define = yes;
}
